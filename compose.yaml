services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    env_file:
      - .env
    ports:
      - '8000:8000'
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
